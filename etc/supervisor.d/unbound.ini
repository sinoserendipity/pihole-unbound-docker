# ---- Unbound ------------------------------------------------
[program:unbound]
command=/usr/sbin/unbound -d -c /etc/unbound/unbound.conf
autostart=true
autorestart=true
startretries=5
priority=10
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
