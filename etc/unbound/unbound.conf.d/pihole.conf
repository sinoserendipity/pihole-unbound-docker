# ============================================================
# /etc/unbound/unbound.conf.d/pihole.conf
# Unbound 递归 DNS 配置，供 Pi-hole 使用
# 监听 127.0.0.1:5335，只接受来自本机的请求
# ============================================================

server:
    # 日志
    verbosity: 1
    log-queries: no
    use-syslog: no
    logfile: ""

    # 监听地址
    interface: 127.0.0.1
    port: 5335

    # 只允许本机查询
    access-control: 127.0.0.1/8 allow

    # 根提示文件
    root-hints: /var/lib/unbound/root.hints

    # 安全增强
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-large-queries: yes
    harden-short-bufsize: yes
    use-caps-for-id: yes

    # DNSSEC — 使用内置根信任锚，不依赖外部 root.key 文件
    # auto-trust-anchor-file 在容器首次启动时容易因权限问题失败，改用内置
    trust-anchor-signaling: yes
    root-key-sentinel: yes

    # 隐私：不转发私有地址的反向查询
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10

    # 缓存
    cache-min-ttl: 300
    cache-max-ttl: 86400
    serve-expired: yes
    serve-expired-ttl: 3600

    # 性能
    num-threads: 1
    msg-cache-slabs: 2
    rrset-cache-slabs: 2
    infra-cache-slabs: 2
    key-cache-slabs: 2
    rrset-cache-size: 32m
    msg-cache-size: 16m
    so-rcvbuf: 1m
    prefetch: yes
    prefetch-key: yes
    minimal-responses: yes

    # 隐藏版本信息
    hide-identity: yes
    hide-version: yes

    # EDNS
    edns-buffer-size: 1232

    # 优先使用 UDP，避免 TCP 连接被上游服务器提前关闭
    tcp-upstream: no
